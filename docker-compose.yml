# Minimal infra: Redis for Celery broker + lock backend.
# Run API + Celery workers on the host; frontend (voice-canvas) runs outside Docker.

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  redis-data:
